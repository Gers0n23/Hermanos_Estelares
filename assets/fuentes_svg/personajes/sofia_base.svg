  <circle cx="222" cy="444" r="19" fill="#F7F9FC" stroke="#2B3350" stroke-width="6"/>
  <circle cx="290" cy="442" r="19" fill="#F7F9FC" stroke="#2B3350" stroke-width="6"/>

