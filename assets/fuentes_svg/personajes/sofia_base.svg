  <!-- rodilleras metalicas -->
  <circle cx="230" cy="598" r="13" fill="#C3CBD8" stroke="#2B3350" stroke-width="5"/>
  <circle cx="282" cy="598" r="13" fill="#C3CBD8" stroke="#2B3350" stroke-width="5"/>
  <circle cx="226" cy="594" r="4.5" fill="#E8ECF2"/>
  <circle cx="278" cy="594" r="4.5" fill="#E8ECF2"/>

  <!-- botas con correas, hebillas y banda turquesa -->
  <g>
    <rect x="203" y="650" width="54" height="58" rx="15" fill="url(#rosa_s)" stroke="#2B3350" stroke-width="6"/>
    <rect x="203" y="689" width="54" height="19" rx="9" fill="#D94F8E" stroke="#2B3350" stroke-width="5"/>
    <rect x="206" y="663" width="48" height="9" rx="4" fill="#45C6C0"/>
    <rect x="239" y="660" width="10" height="14" rx="3" fill="#BFF0ED" stroke="#2B3350" stroke-width="3"/>
