  <circle cx="228" cy="434" r="15" fill="#F7F9FC" stroke="#2B3350" stroke-width="5"/>
  <circle cx="284" cy="432" r="15" fill="#F7F9FC" stroke="#2B3350" stroke-width="5"/>

