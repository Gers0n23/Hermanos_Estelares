  <ellipse cx="336" cy="196" rx="16" ry="22" fill="#F26CA8" stroke="#2B3350" stroke-width="5"/>
  <ellipse cx="176" cy="196" rx="7" ry="12" fill="#FAD1E3"/>
  <ellipse cx="336" cy="196" rx="7" ry="12" fill="#FAD1E3"/>
