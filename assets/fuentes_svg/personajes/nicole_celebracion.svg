  <circle cx="234" cy="588" r="14" fill="#C3CBD8" stroke="#2B3350" stroke-width="5"/>
  <circle cx="279" cy="588" r="14" fill="#C3CBD8" stroke="#2B3350" stroke-width="5"/>
  <circle cx="230" cy="584" r="5" fill="#E8ECF2"/>
  <circle cx="275" cy="584" r="5" fill="#E8ECF2"/>

