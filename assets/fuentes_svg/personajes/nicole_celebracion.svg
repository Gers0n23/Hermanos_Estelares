    <circle cx="342" cy="242" r="6" fill="#FFCB3D" stroke="#2B3350" stroke-width="3"/>
    <!-- pelo delantero: raya al lado con flequillo barrido y mechones ondulados -->
    <path d="M 168 210 Q 156 118 246 100 Q 322 92 342 162 Q 348 184 344 210
             Q 338 178 320 170 Q 326 190 312 198 Q 314 172 294 164 Q 296 184 278 188 Q 278 164 254 162
