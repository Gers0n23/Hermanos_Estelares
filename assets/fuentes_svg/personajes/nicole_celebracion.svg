  <g stroke-linecap="round" fill="none">
    <path d="M 92 210 L 82 188" stroke="#2B3350" stroke-width="13"/>
    <path d="M 92 210 L 82 188" stroke="#F7F9FC" stroke-width="6.5"/>
    <path d="M 106 208 L 74 198" stroke="#2B3350" stroke-width="13"/>
    <path d="M 106 208 L 74 198" stroke="#F7F9FC" stroke-width="6.5"/>
  </g>
  <!-- corazoncito que brota del gesto -->
  <path d="M 74 160 C 71 154 58 146 58 136 C 58 127 68 124 74 133 C 80 124 90 127 90 136 C 90 146 77 154 74 160 Z"
        fill="#F26CA8" stroke="#2B3350" stroke-width="5" stroke-linejoin="round"/>
  <g stroke="#F0A8C8" stroke-width="5" stroke-linecap="round">
    <line x1="48" y1="172" x2="42" y2="180"/>
    <line x1="100" y1="164" x2="106" y2="156"/>
    <line x1="52" y1="128" x2="44" y2="122"/>
  </g>

  <!-- brazo izquierdo: mano en la cadera -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 300 348 L 348 404 L 326 458" stroke="#2B3350" stroke-width="36"/>
    <path d="M 300 348 L 348 404 L 326 458" stroke="#F7F9FC" stroke-width="25"/>
    <path d="M 340 418 L 335 430" stroke="#F26CA8" stroke-width="23"/>
  </g>
  <circle cx="324" cy="464" r="18" fill="#F7F9FC" stroke="#2B3350" stroke-width="6"/>

  <!-- piernas: rodillas juntitas, pose tierna -->
  <g stroke-linecap="round" fill="none">
    <path d="M 228 510 L 238 640" stroke="#2B3350" stroke-width="38"/>
    <path d="M 228 510 L 238 640" stroke="#F7F9FC" stroke-width="27"/>
    <path d="M 284 510 L 276 640" stroke="#2B3350" stroke-width="38"/>
    <path d="M 284 510 L 276 640" stroke="#F7F9FC" stroke-width="27"/>
  </g>
