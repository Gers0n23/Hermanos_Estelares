    <path d="M 278 181 Q 292 174 306 182" fill="none" stroke="#3B2A20" stroke-width="6" stroke-linecap="round"/>
    <!-- nariz -->
    <path d="M 251 240 Q 256 245 261 240" fill="none" stroke="#C98F63" stroke-width="5" stroke-linecap="round"/>
    <!-- sonrisita tierna y chiquita -->
    <path d="M 240 260 Q 256 272 272 260" fill="none" stroke="#2B3350" stroke-width="7" stroke-linecap="round"/>
    <!-- mejillas bien sonrojadas de ternura -->
    <ellipse cx="192" cy="246" rx="14" ry="10" fill="#E8836F" opacity="0.5"/>
    <ellipse cx="320" cy="246" rx="14" ry="10" fill="#E8836F" opacity="0.5"/>

    <!-- casco burbuja -->
    <circle cx="256" cy="188" r="138" fill="#FFD9EA" fill-opacity="0.14" stroke="#F0A8C8" stroke-width="7"/>
    <path d="M 158 122 Q 202 62 270 66" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
    <!-- estrellita antena -->
    <line x1="256" y1="52" x2="256" y2="30" stroke="#2B3350" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(256,18) scale(0.30)">
      <polygon points="0,-46 11.2,-15.4 43.7,-14.2 18.1,5.9 27,37.2 0,19 -27,37.2 -18.1,5.9 -43.7,-14.2 -11.2,-15.4"
