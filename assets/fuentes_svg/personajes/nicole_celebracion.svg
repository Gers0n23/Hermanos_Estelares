    <ellipse cx="292" cy="214" rx="17" ry="23" fill="#FFFFFF" stroke="#2B3350" stroke-width="4"/>
    <circle cx="222" cy="217" r="11" fill="#5B3A21"/>
    <circle cx="290" cy="217" r="11" fill="#5B3A21"/>
    <circle cx="224" cy="220" r="5" fill="#2B1B10"/>
    <circle cx="288" cy="220" r="5" fill="#2B1B10"/>
    <circle cx="218" cy="210" r="4" fill="#FFFFFF"/>
    <circle cx="286" cy="210" r="4" fill="#FFFFFF"/>
    <circle cx="227" cy="222" r="2.2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="295" cy="222" r="2.2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="225" cy="213" r="1.4" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="293" cy="213" r="1.4" fill="#FFFFFF" opacity="0.8"/>
    <g stroke="#2B3350" stroke-width="4" stroke-linecap="round">
      <line x1="205" y1="196" x2="199" y2="190"/>
      <line x1="213" y1="192" x2="209" y2="185"/>
      <line x1="307" y1="196" x2="313" y2="190"/>
      <line x1="299" y1="192" x2="303" y2="185"/>
    </g>
    <!-- cejas suaves y altas, expresion tierna -->
