  <rect x="234" y="272" width="44" height="12" rx="6" fill="#D79E6F" opacity="0.5"/>
  <rect x="218" y="306" width="76" height="26" rx="12" fill="#E9D3DE" stroke="#2B3350" stroke-width="5"/>

  <!-- cabeza levemente ladeada hacia su corazon (gira sobre la base del cuello) -->
