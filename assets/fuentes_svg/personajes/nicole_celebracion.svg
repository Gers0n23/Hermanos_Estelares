    <line x1="109" y1="571" x2="131" y2="571"/>
    <line x1="410" y1="180" x2="410" y2="200"/>
    <line x1="400" y1="190" x2="420" y2="190"/>
  </g>
  <circle cx="140" cy="620" r="6" fill="#F685B7"/>
  <circle cx="446" cy="240" r="6" fill="#FFCB3D"/>

  <!-- pelo trasero: melena ondulada con volumen -->
  <path d="M 178 148 Q 136 198 150 258 Q 134 296 152 336 Q 138 376 158 414 Q 148 450 172 472 Q 194 464 190 432 L 322 432 Q 318 464 340 472 Q 364 450 354 414 Q 374 376 360 336 Q 378 296 362 258 Q 376 198 334 148 Z"
        fill="#3B2A20" stroke="#2B3350" stroke-width="6" stroke-linejoin="round"/>
  <g fill="none" stroke="#2B1D15" stroke-width="5" stroke-linecap="round" opacity="0.55">
    <path d="M 174 240 Q 162 300 174 360 Q 166 410 178 444"/>
    <path d="M 338 240 Q 350 300 338 360 Q 346 410 334 444"/>
    <path d="M 200 300 Q 194 360 202 420"/>
    <path d="M 312 300 Q 318 360 310 420"/>
  </g>

  <!-- mochilita rosa asomando detras del torso -->
  <rect x="182" y="348" width="30" height="92" rx="14" fill="#D94F8E" stroke="#2B3350" stroke-width="5"/>
  <rect x="300" y="348" width="30" height="92" rx="14" fill="#D94F8E" stroke="#2B3350" stroke-width="5"/>

  <!-- brazo derecho de Nicole (izquierda del que mira): levantado haciendo el corazon coreano -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 212 348 L 152 300 L 108 238" stroke="#2B3350" stroke-width="36"/>
    <path d="M 212 348 L 152 300 L 108 238" stroke="#F7F9FC" stroke-width="25"/>
    <path d="M 140 290 L 128 274" stroke="#F26CA8" stroke-width="23"/>
  </g>
  <!-- punito con el indice y el pulgar cruzados -->
