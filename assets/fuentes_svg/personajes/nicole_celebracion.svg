  <g fill="#F26CA8" stroke="#2B3350" stroke-width="5" stroke-linejoin="round">
    <path d="M 430 300 C 427 294 413 285 413 275 C 413 266 423 263 430 272 C 437 263 447 266 447 275 C 447 285 433 294 430 300 Z"/>
    <path d="M 452 420 C 450 416 440 410 440 403 C 440 397 447 395 452 401 C 457 395 464 397 464 403 C 464 410 454 416 452 420 Z" stroke-width="4"/>
    <path d="M 96 480 C 94 476 84 470 84 463 C 84 457 91 455 96 461 C 101 455 108 457 108 463 C 108 470 98 476 96 480 Z" stroke-width="4"/>
  </g>
  <g fill="#FFCB3D" stroke="#2B3350" stroke-width="8" stroke-linejoin="round">
    <g transform="translate(430,540) scale(0.30) rotate(14)">
      <polygon points="0,-46 11.2,-15.4 43.7,-14.2 18.1,5.9 27,37.2 0,19 -27,37.2 -18.1,5.9 -43.7,-14.2 -11.2,-15.4"/>
    </g>
    <g transform="translate(84,340) scale(0.26) rotate(-10)">
      <polygon points="0,-46 11.2,-15.4 43.7,-14.2 18.1,5.9 27,37.2 0,19 -27,37.2 -18.1,5.9 -43.7,-14.2 -11.2,-15.4"/>
    </g>
  </g>
  <g stroke="#F0A8C8" stroke-width="7" stroke-linecap="round">
