<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <!-- Nicole (5 anios) - pose celebracion (su gesto real): corazon coreano con los dedos,
       expresion tierna, cabeza ladeada y mano en la cadera -->
  <defs>
    <radialGradient id="brillo_estrella_nc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE38A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFE38A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="traje_blanco_nc" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E4E9F3"/>
    </linearGradient>
    <linearGradient id="rosa_nc" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#F685B7"/>
      <stop offset="100%" stop-color="#E0559A"/>
    </linearGradient>
  </defs>

  <!-- sombra en el suelo -->
  <ellipse cx="256" cy="722" rx="112" ry="16" fill="#2B3350" opacity="0.12"/>

