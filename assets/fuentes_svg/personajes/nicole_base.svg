  <circle cx="284" cy="588" r="14" fill="#C3CBD8" stroke="#2B3350" stroke-width="5"/>
  <circle cx="224" cy="584" r="5" fill="#E8ECF2"/>
  <circle cx="280" cy="584" r="5" fill="#E8ECF2"/>

