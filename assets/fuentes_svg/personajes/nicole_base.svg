<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <!-- Nicole (5 anios) - pose base: saludando alegre, sonrisita picara, trigueña clara -->
  <defs>
    <radialGradient id="brillo_estrella_n" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE38A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFE38A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="traje_blanco_n" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E4E9F3"/>
    </linearGradient>
    <linearGradient id="rosa_n" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#F685B7"/>
      <stop offset="100%" stop-color="#E0559A"/>
    </linearGradient>
  </defs>

  <!-- sombra en el suelo -->
  <ellipse cx="256" cy="722" rx="118" ry="17" fill="#2B3350" opacity="0.12"/>

  <!-- pelo trasero: melena ondulada con volumen -->
  <path d="M 178 148 Q 136 198 150 258 Q 134 296 152 336 Q 138 376 158 414 Q 148 450 172 472 Q 194 464 190 432 L 322 432 Q 318 464 340 472 Q 364 450 354 414 Q 374 376 360 336 Q 378 296 362 258 Q 376 198 334 148 Z"
        fill="#3B2A20" stroke="#2B3350" stroke-width="6" stroke-linejoin="round"/>
  <g fill="none" stroke="#2B1D15" stroke-width="5" stroke-linecap="round" opacity="0.55">
    <path d="M 174 240 Q 162 300 174 360 Q 166 410 178 444"/>
    <path d="M 338 240 Q 350 300 338 360 Q 346 410 334 444"/>
    <path d="M 200 300 Q 194 360 202 420"/>
    <path d="M 312 300 Q 318 360 310 420"/>
  </g>

  <!-- mochilita rosa asomando detras del torso -->
