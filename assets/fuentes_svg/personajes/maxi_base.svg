<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768" width="512" height="768">
  <!-- Maxi (2 anios) - pose base: astronauta valiente, mano en la cadera, el mas clarito -->
  <defs>
    <radialGradient id="brillo_estrella_m" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE38A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFE38A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="traje_blanco_m" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E4E9F3"/>
    </linearGradient>
  </defs>

  <!-- sombra en el suelo -->
  <ellipse cx="256" cy="708" rx="118" ry="17" fill="#2B3350" opacity="0.12"/>

  <!-- brazo izquierdo (lado izquierdo del que mira): colgando -->
  <g stroke-linecap="round" fill="none">
    <path d="M 206 350 L 170 458" stroke="#2B3350" stroke-width="38"/>
    <path d="M 206 350 L 170 458" stroke="#F7F9FC" stroke-width="27"/>
    <path d="M 179 428 L 186 432" stroke="#3E77CC" stroke-width="25"/>
  </g>
  <circle cx="167" cy="466" r="19" fill="#F7F9FC" stroke="#2B3350" stroke-width="6"/>

  <!-- brazo derecho: mano en la cadera -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 306 350 L 352 408 L 326 462" stroke="#2B3350" stroke-width="38"/>
    <path d="M 306 350 L 352 408 L 326 462" stroke="#F7F9FC" stroke-width="27"/>
    <path d="M 344 420 L 339 432" stroke="#3E77CC" stroke-width="25"/>
  </g>
  <circle cx="324" cy="468" r="19" fill="#F7F9FC" stroke="#2B3350" stroke-width="6"/>

  <!-- piernas (cortitas y regordetas de bebe) -->
  <g stroke-linecap="round" fill="none">
    <path d="M 222 505 L 222 622" stroke="#2B3350" stroke-width="43"/>
    <path d="M 222 505 L 222 622" stroke="#F7F9FC" stroke-width="31"/>
    <path d="M 290 505 L 290 622" stroke="#2B3350" stroke-width="43"/>
    <path d="M 290 505 L 290 622" stroke="#F7F9FC" stroke-width="31"/>
  </g>
  <!-- rodilleras metalicas -->
  <circle cx="222" cy="572" r="15" fill="#C3CBD8" stroke="#2B3350" stroke-width="5"/>
  <circle cx="290" cy="572" r="15" fill="#C3CBD8" stroke="#2B3350" stroke-width="5"/>
  <circle cx="217" cy="567" r="5.5" fill="#E8ECF2"/>
  <circle cx="285" cy="567" r="5.5" fill="#E8ECF2"/>

  <!-- botas con correas y hebillas -->
  <g>
    <rect x="192" y="616" width="60" height="62" rx="16" fill="url(#traje_blanco_m)" stroke="#2B3350" stroke-width="6"/>
    <rect x="192" y="658" width="60" height="20" rx="10" fill="#3E77CC" stroke="#2B3350" stroke-width="5"/>
    <rect x="195" y="630" width="54" height="9" rx="4" fill="#3E77CC"/>
    <rect x="232" y="627" width="11" height="14" rx="3" fill="#6FD6E8" stroke="#2B3350" stroke-width="3"/>
    <rect x="260" y="616" width="60" height="62" rx="16" fill="url(#traje_blanco_m)" stroke="#2B3350" stroke-width="6"/>
    <rect x="260" y="658" width="60" height="20" rx="10" fill="#3E77CC" stroke="#2B3350" stroke-width="5"/>
    <rect x="263" y="630" width="54" height="9" rx="4" fill="#3E77CC"/>
    <rect x="300" y="627" width="11" height="14" rx="3" fill="#6FD6E8" stroke="#2B3350" stroke-width="3"/>
  </g>

  <!-- torso: de ninio pequenio, con pancita -->
  <path d="M 212 330 L 300 330 Q 316 330 317 350 Q 323 420 317 502 L 195 502 Q 189 420 195 350 Q 196 330 212 330 Z"
        fill="url(#traje_blanco_m)" stroke="#2B3350" stroke-width="6"/>
  <!-- franjas azules de hombros -->
  <path d="M 212 332 L 246 332 L 239 372 L 200 372 Z" fill="#3E77CC"/>
  <path d="M 300 332 L 266 332 L 273 372 L 312 372 Z" fill="#3E77CC"/>
  <!-- estrella del pecho con brillo y destellos -->
  <circle cx="256" cy="406" r="56" fill="url(#brillo_estrella_m)"/>
  <g transform="translate(256,406) scale(0.85)">
    <polygon points="0,-46 11.2,-15.4 43.7,-14.2 18.1,5.9 27,37.2 0,19 -27,37.2 -18.1,5.9 -43.7,-14.2 -11.2,-15.4"
             fill="#FFCB3D" stroke="#2B3350" stroke-width="5" stroke-linejoin="round"/>
    <polygon points="0,-24 5.9,-8.1 22.9,-7.4 9.5,3.1 14.1,19.5 0,10 -14.1,19.5 -9.5,3.1 -22.9,-7.4 -5.9,-8.1"
             fill="#FFE38A"/>
  </g>
  <g stroke="#FFE38A" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="354" x2="256" y2="346"/>
    <line x1="256" y1="458" x2="256" y2="466"/>
    <line x1="206" y1="406" x2="214" y2="406"/>
    <line x1="298" y1="406" x2="306" y2="406"/>
  </g>

  <!-- cinturon con estuches e insignia de dinosaurio -->
  <rect x="196" y="486" width="120" height="28" rx="13" fill="#3E77CC" stroke="#2B3350" stroke-width="5"/>
  <rect x="201" y="483" width="24" height="32" rx="6" fill="#BFE4F2" stroke="#2B3350" stroke-width="4"/>
  <rect x="287" y="483" width="24" height="32" rx="6" fill="#BFE4F2" stroke="#2B3350" stroke-width="4"/>
  <line x1="201" y1="496" x2="225" y2="496" stroke="#2B3350" stroke-width="3"/>
  <line x1="287" y1="496" x2="311" y2="496" stroke="#2B3350" stroke-width="3"/>
  <circle cx="256" cy="500" r="21" fill="#EAF1FF" stroke="#2B3350" stroke-width="5"/>
  <g transform="translate(256,501)" fill="#55B26B">
    <ellipse cx="0" cy="4" rx="11" ry="6"/>
    <circle cx="10" cy="-1" r="4.5"/>
    <path d="M -11 4 L -17 -1 L -8 0 Z"/>
    <path d="M -7 -1 L -4 -8 L -1 -1 Z"/>
    <path d="M -1 -1 L 2 -8 L 5 -1 Z"/>
  </g>

  <!-- cuello -->
  <rect x="234" y="290" width="44" height="30" rx="10" fill="#F6D3B2" stroke="#2B3350" stroke-width="4"/>
  <rect x="216" y="308" width="80" height="26" rx="12" fill="#C9D6EA" stroke="#2B3350" stroke-width="5"/>

  <!-- cabeza: el mas clarito de los tres -->
  <circle cx="256" cy="215" r="98" fill="#F6D3B2" stroke="#2B3350" stroke-width="6"/>
  <path d="M 325 146 A 98 98 0 0 1 325 284 A 132 132 0 0 0 325 146 Z" fill="#E4B48C" opacity="0.35"/>
  <!-- orejas -->
  <circle cx="160" cy="222" r="14" fill="#F6D3B2" stroke="#2B3350" stroke-width="5"/>
  <circle cx="352" cy="222" r="14" fill="#F6D3B2" stroke="#2B3350" stroke-width="5"/>
  <!-- pelo castanio oscuro tupido con remolino -->
  <path d="M 158 218 Q 150 124 226 110 Q 250 90 272 108 Q 346 116 354 218
           Q 344 196 322 192 Q 330 176 314 168 Q 308 182 290 178 Q 296 162 280 156 Q 270 172 250 170
           Q 252 152 236 150 Q 232 168 212 172 Q 210 156 196 160 Q 200 178 184 188 Q 170 196 158 218 Z"
        fill="#4A3226" stroke="#2B3350" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 268 102 Q 278 84 298 88 Q 286 92 284 102 Q 292 98 298 104 Q 286 106 280 112 Z"
        fill="#4A3226" stroke="#2B3350" stroke-width="5" stroke-linejoin="round"/>
  <!-- ojos enormes y brillantes -->
  <ellipse cx="216" cy="228" rx="18" ry="24" fill="#FFFFFF" stroke="#2B3350" stroke-width="4"/>
  <ellipse cx="296" cy="228" rx="18" ry="24" fill="#FFFFFF" stroke="#2B3350" stroke-width="4"/>
  <circle cx="218" cy="231" r="11" fill="#5B3A21"/>
  <circle cx="294" cy="231" r="11" fill="#5B3A21"/>
  <circle cx="220" cy="234" r="5.5" fill="#2B1B10"/>
  <circle cx="292" cy="234" r="5.5" fill="#2B1B10"/>
  <circle cx="214" cy="224" r="3.8" fill="#FFFFFF"/>
  <circle cx="290" cy="224" r="3.8" fill="#FFFFFF"/>
  <circle cx="223" cy="238" r="2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="299" cy="238" r="2" fill="#FFFFFF" opacity="0.8"/>
  <!-- cejas -->
  <path d="M 200 199 Q 216 191 232 199" fill="none" stroke="#4A3226" stroke-width="7" stroke-linecap="round"/>
  <path d="M 280 199 Q 296 191 312 199" fill="none" stroke="#4A3226" stroke-width="7" stroke-linecap="round"/>
  <!-- nariz -->
  <path d="M 250 256 Q 256 262 262 256" fill="none" stroke="#D9A97A" stroke-width="6" stroke-linecap="round"/>
  <!-- sonrisa abierta de pura emocion -->
  <path d="M 224 274 Q 256 308 288 274 Q 256 288 224 274 Z" fill="#8A4436" stroke="#2B3350" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 231 276 Q 256 285 281 276 L 277 271 Q 256 277 235 271 Z" fill="#FFFFFF"/>
  <!-- mejillas -->
  <ellipse cx="182" cy="262" rx="13" ry="9" fill="#F0917E" opacity="0.45"/>
  <ellipse cx="330" cy="262" rx="13" ry="9" fill="#F0917E" opacity="0.45"/>

  <!-- casco burbuja (encima de todo) -->
  <circle cx="256" cy="200" r="150" fill="#BEDCFF" fill-opacity="0.14" stroke="#9CC4EE" stroke-width="7"/>
  <path d="M 148 128 Q 196 66 268 72" fill="none" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round" opacity="0.55"/>
  <!-- estrellita antena -->
  <line x1="256" y1="50" x2="256" y2="26" stroke="#2B3350" stroke-width="6" stroke-linecap="round"/>
  <g transform="translate(256,14) scale(0.32)">
    <polygon points="0,-46 11.2,-15.4 43.7,-14.2 18.1,5.9 27,37.2 0,19 -27,37.2 -18.1,5.9 -43.7,-14.2 -11.2,-15.4"
             fill="#FFCB3D" stroke="#2B3350" stroke-width="10" stroke-linejoin="round"/>
  </g>
</svg>
